[project]
name = "irishpub-map"
description = "日本国内の Irish Pub を地図上で探せる Web アプリ"
primary_language = "TypeScript"
node_version = "22"
package_manager = "npm"
workspace = true

[paths]
web_app = "apps/web"
shared_package = "packages/shared"
pub_data = "data/pubs.json"
github_config = ".github"

[commands]
setup = "nvm use && npm install"
dev = "npm run dev"
typecheck = "npm run typecheck"
lint = "npm run lint"
build = "npm run build"
audit = "npm audit --omit=dev"

[git]
default_branch = "main"
branch_prefix = "ai/"
commit_user_name = "yf AI Agent"
commit_user_email = "300566984+yf-ai-agent@users.noreply.github.com"
protect_main = true

[pull_request]
base = "main"
language = "ja"
include_issue_closer = true
include_verification = true

[agent]
read_instructions = "AGENTS.md"
prefer_small_scoped_changes = true
preserve_user_changes = true
run_validation_for_app_changes = true
