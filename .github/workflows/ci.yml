name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SLACK_CICD_WEBHOOK_URL: ${{ secrets.SLACK_CICD_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Notify Slack
        if: always() && env.SLACK_CICD_WEBHOOK_URL != ''
        env:
          JOB_STATUS: ${{ job.status }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          WORKFLOW: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          status = os.environ["JOB_STATUS"]
          icon = "✅" if status == "success" else "❌"
          payload = {
              "channel": "#cicd-log",
              "text": (
                  f"{icon} {os.environ['WORKFLOW']} {status}\n"
                  f"Repository: {os.environ['REPOSITORY']}\n"
                  f"Branch: {os.environ['REF_NAME']}\n"
                  f"Run: {os.environ['RUN_URL']}"
              ),
          }
          request = urllib.request.Request(
              os.environ["SLACK_CICD_WEBHOOK_URL"],
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=10) as response:
              response.read()
          PY
